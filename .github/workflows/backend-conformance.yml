name: Backend Conformance

on:
  workflow_dispatch:
    inputs:
      setup_command:
        description: "Optional shell command that installs or activates real backend binaries."
        required: false
        default: ""
      zls_path:
        description: "Path or command name for zls."
        required: false
        default: "zls"
      zwanzig_path:
        description: "Path or command name for zwanzig."
        required: false
        default: "zwanzig"
      zflame_path:
        description: "Path or command name for zflame."
        required: false
        default: "zflame"
      diff_folded_path:
        description: "Path or command name for diff-folded."
        required: false
        default: "diff-folded"

permissions:
  contents: read

jobs:
  backend-conformance:
    name: Real optional backends
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Zig
        # mlugg/setup-zig@v2
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.16.0

      - name: Optional backend setup
        if: ${{ inputs.setup_command != '' }}
        run: ${{ inputs.setup_command }}

      - name: Run backend conformance
        env:
          ZIGARS_CONFORMANCE_REPORT_DIR: backend-conformance
          ZIGARS_ZLS_PATH: ${{ inputs.zls_path }}
          ZIGARS_ZWANZIG_PATH: ${{ inputs.zwanzig_path }}
          ZIGARS_ZFLAME_PATH: ${{ inputs.zflame_path }}
          ZIGARS_DIFF_FOLDED_PATH: ${{ inputs.diff_folded_path }}
        run: bash .github/scripts/backend-conformance.sh

      - name: Upload conformance evidence
        if: always()
        # actions/upload-artifact@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: zigars-backend-conformance
          path: backend-conformance
