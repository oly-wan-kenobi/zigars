name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  zig:
    name: Zig 0.16.0
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Zig
        # mlugg/setup-zig@v2
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.16.0

      - name: Install kcov
        run: bash .github/scripts/install-kcov.sh

      - name: Release gate
        run: zig build release-check

      - name: Bounded fuzz smoke
        run: zig build test --fuzz=10K

      - name: Release asset smoke
        run: zig build dist release-asset-smoke

      - name: CLI smoke
        run: |
          zig build -Doptimize=ReleaseSafe
          expected_version="$(zig build version)"
          zig-out/bin/zigars --help >/tmp/zigars-help.out 2>/tmp/zigars-help.err
          test ! -s /tmp/zigars-help.out
          grep -q "deterministic Zig development MCP server" /tmp/zigars-help.err
          zig-out/bin/zigars --version >/tmp/zigars-version.out 2>/tmp/zigars-version.err
          test ! -s /tmp/zigars-version.out
          grep -q "zigars ${expected_version}" /tmp/zigars-version.err

  coverage:
    name: Test quality summary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Zig
        # mlugg/setup-zig@v2
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.16.0

      - name: Install kcov
        run: bash .github/scripts/install-kcov.sh

      - name: Run test quality summary
        run: zig build coverage

      - name: Upload coverage artifact
        if: always()
        # actions/upload-artifact@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: zigars-coverage
          path: coverage

  macos:
    name: macOS smoke
    runs-on: macos-latest

    steps:
      - name: Checkout
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Zig
        # mlugg/setup-zig@v2
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.16.0

      - name: Check formatting
        run: zig build fmt-check

      - name: Test
        run: zig build test

      - name: ReleaseSafe build
        run: zig build release-safe

      - name: Transport smoke
        run: zig build smoke stdio-fixtures

  windows:
    # Windows has been the source of repeated platform-only regressions (path
    # separators, default file open, fixture matching), so it runs the deepest
    # gate the platform supports: every pure-Zig constituent of `release-check`.
    # The two release-check substeps it omits are Linux-bound -- the kcov
    # coverage floor (`coverage --require-kcov`) and the bash backend-conformance
    # contract smoke -- and stay covered by the Ubuntu `zig`/`coverage` jobs.
    name: Windows release gate
    runs-on: windows-latest

    steps:
      - name: Checkout
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Zig
        # mlugg/setup-zig@v2
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.16.0

      - name: Contract and docs gates
        run: zig build fmt-check docs-check json-check backend-contract-scenarios public-contracts

      - name: Architecture gates
        run: zig build artifact-hygiene architecture-guard hex-architecture-inventory

      - name: Build and test
        run: zig build test release-safe

      - name: Transport smoke
        run: zig build smoke stdio-fixtures
